name: Check

on: [ push, pull_request ]
jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: zulu
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew check --parallel
